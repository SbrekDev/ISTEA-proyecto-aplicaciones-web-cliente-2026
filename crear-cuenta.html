<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta - ZONIX</title>
    <meta name="description" content="Creá tu cuenta en ZONIX">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body data-page="crear-cuenta">
    <header>
        <div class="title">
            <h1>ZONIX</h1>
        </div>
        <p class="subtitle">Descubre los mejores juegos de mesa para toda la familia</p>
    </header>

    <span id="nav-placeholder"></span>
    <script src="components/nav.js"></script>

    <main class="main-content auth-main">
        <div class="auth-container">
            <div class="auth-box">
                <h2>Creá tu cuenta</h2>
                <p class="auth-subtitle">Completá tus datos</p>
                
                <form action="#" method="post" class="auth-form">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
                    </div>
                    
                    <div class="form-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido" required placeholder="Tu apellido">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="tu@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="Mínimo 8 caracteres">
                    </div>
                    
                    <div class="form-group">
                        <label for="telefono">Teléfono (opcional)</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="Tu número de teléfono">
                    </div>
                    
                    <div class="form-group check-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="novedades" name="novedades">
                            <span>Recibir ofertas y novedades</span>
                        </label>
                    </div>
                    
                    <div class="form-group check-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terminos" name="terminos" required>
                            <span>Acepto los <a href="#">Términos y Condiciones</a></span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn-primary btn-full">Crear cuenta</button>
                </form>
            </div>
            
            <div class="auth-box auth-box-secondary">
                <p class="auth-register-text">¿Ya tenés una cuenta?</p>
                <a href="login.html" class="btn-secondary btn-full">Iniciar sesión</a>
            </div>
        </div>
    </main>

    <footer>
        <address>
            <p>ZONIX S.A.</p>
            <p>Email: contacto@zonix.com</p>
            <p>Teléfono: 0800-123-4567</p>
        </address>
        <p>&copy; 2026 ZONIX. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
