<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - ZONIX</title>
    <meta name="description" content="Inicia sesión en ZONIX">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body data-page="login">
    <header>
        <div class="title">
            <h1>ZONIX</h1>
        </div>
        <p class="subtitle">Descubre los mejores juegos de mesa para toda la familia</p>
    </header>

    <span id="nav-placeholder"></span>
    <script src="components/nav.js"></script>

    <main class="main-content auth-main">
        <div class="auth-container">
            <div class="auth-box">
                <h2>Ingresá tu email</h2>
                <p class="auth-subtitle">Iniciá sesión con tu cuenta</p>
                
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="tu@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="Tu contraseña">
                    </div>
                    
                    <div class="form-group check-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="recordarme" name="recordarme">
                            <span>Recordarme</span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn-primary btn-full">Continuar</button>
                </form>
                
                <div class="auth-links">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>
            </div>
            
            <div class="auth-box auth-box-secondary">
                <p class="auth-register-text">¿No tenés cuenta?</p>
                <a href="crear-cuenta.html" class="btn-secondary btn-full">Crear cuenta</a>
            </div>
        </div>
    </main>

    <footer>
        <address>
            <p>ZONIX S.A.</p>
            <p>Email: contacto@zonix.com</p>
            <p>Teléfono: 0800-123-4567</p>
        </address>
        <p>&copy; 2026 ZONIX. Todos los derechos reservados.</p>
    </footer>

    <div id="toast-container"></div>

    <script src="components/login.js"></script>
</body>
</html>
