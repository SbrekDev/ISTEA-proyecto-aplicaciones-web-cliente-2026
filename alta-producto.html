<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Producto - ZONIX</title>
    <meta name="description" content="Agregar nuevo producto a la tienda">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body data-page="alta-producto">
    <header>
        <div class="title">
            <h1>ZONIX</h1>
        </div>
        <p class="subtitle">Descubre los mejores juegos de mesa para toda la familia</p>
    </header>

    <span id="nav-placeholder"></span>
    <script src="components/nav.js"></script>

    <main class="main-content">
        <section id="alta-producto">
            <h2>Alta de Producto</h2>
            <p>Completa el formulario para agregar un nuevo producto</p>
            <form id="altaProductoForm">
                <div class="form-group">
                    <label for="nombre">Nombre del juego: <span aria-label="requerido">*</span></label>
                    <input id="nombre" name="nombre" type="text" required placeholder="Ej. Catan">
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción: <span aria-label="requerido">*</span></label>
                    <textarea id="descripcion" name="descripcion" rows="4" required placeholder="Breve descripción del juego"></textarea>
                </div>

                <div class="form-group">
                    <label for="editorial">Editorial: <span aria-label="requerido">*</span></label>
                    <input id="editorial" name="editorial" type="text" required placeholder="Editorial o fabricante">
                </div>

                <div class="form-group">
                    <label for="jugadores_min">Jugadores (mín): <span aria-label="requerido">*</span></label>
                    <input id="jugadores_min" name="jugadores_min" type="number" min="1" required>
                </div>

                <div class="form-group">
                    <label for="jugadores_max">Jugadores (máx): <span aria-label="requerido">*</span></label>
                    <input id="jugadores_max" name="jugadores_max" type="number" min="1" required>
                </div>

                <div class="form-group">
                    <label for="tiempo_juego">Tiempo de juego: <span aria-label="requerido">*</span></label>
                    <input id="tiempo_juego" name="tiempo_juego" type="text" required placeholder="Ej. 30-60 min">
                </div>

                <div class="form-group">
                    <label for="edad_min">Edad mínima recomendada: <span aria-label="requerido">*</span></label>
                    <input id="edad_min" name="edad_min" type="number" min="3" max="99" required>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoría: <span aria-label="requerido">*</span></label>
                    <select id="categoria" name="categoria" required>
                        <option value="">Seleccionar...</option>
                        <option value="estrategia">Estrategia</option>
                        <option value="familia">Familia</option>
                        <option value="party">Party</option>
                        <option value="cooperativo">Cooperativo</option>
                        <option value="eurogame">Eurojuego</option>
                        <option value="tematico">Temático</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="idioma">Idioma: <span aria-label="requerido">*</span></label>
                    <input id="idioma" name="idioma" type="text" required placeholder="Idioma de reglas">
                </div>

                <div class="form-group">
                    <label for="precio">Precio ($): <span aria-label="requerido">*</span></label>
                    <input id="precio" name="precio" type="number" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="stock">Stock disponible:</label>
                    <input id="stock" name="stock" type="number" min="0">
                </div>

                <div class="form-group">
                    <label for="imagen_url">URL de imagen del producto:</label>
                    <input id="imagen_url" name="imagen_url" type="url" placeholder="https://">
                </div>

                <div class="form-group">
                    <label for="peso">Peso (kg):</label>
                    <input id="peso" name="peso" type="number" step="0.01" min="0">
                </div>

                <div class="form-group">
                    <label for="oferta">¿En oferta?</label>
                    <select id="oferta" name="oferta">
                        <option value="no">No</option>
                        <option value="si">Sí</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="porcentaje_oferta">Porcentaje de descuento (%):</label>
                    <input id="porcentaje_oferta" name="porcentaje_oferta" type="number" min="1" max="99" step="1" disabled>
                </div>

                <button type="submit">Dar de alta</button>
            </form>
        </section>
    </main>

    <footer>
        <address>
            <p>ZONIX S.A.</p>
            <p>Email: contacto@zonix.com</p>
            <p>Teléfono: 0800-123-4567</p>
        </address>
        <p>&copy; 2026 ZONIX. Todos los derechos reservados.</p>
    </footer>

    <div id="toast-container"></div>

    <script src="components/supabase-creds.js"></script>
    <script src="components/products-crud.js"></script>
    <script>
        document.getElementById('oferta').addEventListener('change', function () {
            var percInput = document.getElementById('porcentaje_oferta')
            if (this.value === 'si') {
                percInput.disabled = false
                percInput.required = true
            } else {
                percInput.disabled = true
                percInput.required = false
                percInput.value = ''
            }
        })

        document.getElementById('altaProductoForm').addEventListener('submit', async function (e) {
            e.preventDefault()

            const button = this.querySelector('button[type="submit"]')
            const originalText = button.textContent
            button.disabled = true
            button.textContent = 'Guardando...'

            const isOffer = document.getElementById('oferta').value === 'si'

            const product = {
                name: document.getElementById('nombre').value.trim(),
                description: document.getElementById('descripcion').value.trim(),
                editorial: document.getElementById('editorial').value.trim(),
                minplayers: parseInt(document.getElementById('jugadores_min').value),
                maxplayers: parseInt(document.getElementById('jugadores_max').value),
                gametime: document.getElementById('tiempo_juego').value.trim(),
                minage: parseInt(document.getElementById('edad_min').value),
                category: document.getElementById('categoria').value,
                language: document.getElementById('idioma').value.trim(),
                price: parseFloat(document.getElementById('precio').value),
                stock: document.getElementById('stock').value ? parseInt(document.getElementById('stock').value) : null,
                imageurl: document.getElementById('imagen_url').value.trim() || null,
                weight: document.getElementById('peso').value ? parseFloat(document.getElementById('peso').value) : null,
                offer: isOffer,
                offerpercentage: isOffer ? parseInt(document.getElementById('porcentaje_oferta').value) : null
            }

            try {
                await createProduct(product)
                showToast('Producto creado exitosamente', 'success')
                this.reset()
            } catch (err) {
                showToast('Error al crear producto: ' + err.message, 'error')
            } finally {
                button.disabled = false
                button.textContent = originalText
            }
        })

        function showToast(message, type) {
            const container = document.getElementById('toast-container')
            const toast = document.createElement('div')
            toast.className = 'toast toast-' + type
            toast.textContent = message
            container.appendChild(toast)
            setTimeout(function () {
                toast.classList.add('toast-fade')
                setTimeout(function () { toast.remove() }, 400)
            }, 3500)
        }
    </script>
</body>
</html>
