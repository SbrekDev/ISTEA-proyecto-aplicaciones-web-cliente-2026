<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - ZONIX</title>
    <meta name="description" content="Catálogo de juegos de mesa">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body data-page="catalogo">
    <header>
        <div class="title">
            <h1>ZONIX</h1>
        </div>
        <p class="subtitle">Descubre los mejores juegos de mesa para toda la familia</p>
    </header>

    <span id="nav-placeholder"></span>
    <script src="components/nav.js"></script>

    <button id="btn-menu-filtros" class="btn-menu-filtros" aria-label="Abrir filtros">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        <span>Filtros</span>
    </button>

    <div class="container">
        <div id="sidebar-container" class="sidebar-container" data-show-filtros="true"></div>

        <main class="main-content">
            <section id="catalogo">
                <h2>Nuestro Catálogo</h2>
                <div class="buscador">
                    <input type="text" id="search-input" placeholder="Buscar juegos..." aria-label="Buscar productos">
                </div>
                <div class="productos-grid"></div>
            </section>
        </main>
    </div>

    <footer>
        <address>
            <p>ZONIX S.A.</p>
            <p>Email: contacto@zonix.com</p>
            <p>Teléfono: 0800-123-4567</p>
        </address>
        <p>&copy; 2026 ZONIX. Todos los derechos reservados.</p>
    </footer>
    <script src="components/supabase-creds.js"></script>
    <script src="components/products-crud.js"></script>
    <script src="components/cart.js"></script>
    <script src="components/sidebar-categorias.js"></script>
    <script src="components/catalogo.js"></script>
    <script>
        document.getElementById('btn-menu-filtros').addEventListener('click', function() {
            document.getElementById('sidebar-container').classList.toggle('active');
        });
    </script>
</body>
</html>
