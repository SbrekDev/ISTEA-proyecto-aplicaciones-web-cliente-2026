<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - ZONIX</title>
    <meta name="description" content="Contacta con nosotros">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body data-page="contact">
    <header>
        <div class="title">
            <h1>ZONIX</h1>
        </div>
        <p class="subtitle">Descubre los mejores juegos de mesa para toda la familia</p>
    </header>

    <span id="nav-placeholder"></span>
    <script src="components/nav.js"></script>

    <main class="main-content">
        <section id="contacto">
            <h2>Contacto</h2>
            <p>Completa el formulario y nos pondremos en contacto contigo</p>

            <form action="#" method="post">
                <div class="form-group">
                    <label for="nombre">Nombre: <span aria-label="requerido">*</span></label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Email: <span aria-label="requerido">*</span></label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono">
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje: <span aria-label="requerido">*</span></label>
                    <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
                </div>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <address>
            <p>ZONIX S.A.</p>
            <p>Email: contacto@zonix.com</p>
            <p>Teléfono: 0800-123-4567</p>
        </address>
        <p>&copy; 2026 ZONIX. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
